version: "3.9"
services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: radiant-grace
    volumes:
      - mongo_data:/data/db
  server:
    image: node:20-alpine
    command: sh -c "npm install && npm run dev"
    working_dir: /app
    volumes:
      - ./server:/app
      - ./shared:/shared
      - ./.env:/app/../.env
    environment:
      NODE_ENV: development
      PORT: 5000
      CLIENT_URL: http://localhost:3000
      MONGODB_URI: mongodb://mongodb:27017/radiant-grace
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      MAPS_EMBED_URL: ${MAPS_EMBED_URL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
  client:
    image: node:20-alpine
    command: sh -c "npm install && npm start"
    working_dir: /app
    volumes:
      - ./client:/app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_STRIPE_PUBLISHABLE_KEY: pk_test_your_key
      REACT_APP_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - server
volumes:
  mongo_data:
